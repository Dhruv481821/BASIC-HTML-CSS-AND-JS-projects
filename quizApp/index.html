<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz-app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header></header>

    <main>
        <div class="container">
            <div class="small_container">
                <p>quiz-app</p>
            </div>

            <div class="que_ans">

                <p id="que"> what is my name?</p>

                    <p class="ans_input">
                        <input type="radio" name="answer" id="a">
                        <label for ="a" id="optionA">option A</label>
                    </p>

                    <p class="ans_input">
                        <input type="radio" name="answer" id="b">
                        <label for ="b" id="optionB">option B</label>
                    </p>

                    <p class="ans_input">
                        <input type="radio" name="answer" id="c">
                        <label for ="c" id="optionC">option C</label>
                    </p>

                    <p class="ans_input">
                        <input type="radio" name="answer" id="d">
                        <label for ="d`" id="optionD">option D</label>
                    </p>

                    <p id="questionNumber"></p>

                    <button id="nextBtn"> Next </button>

            </div>

        </div>
    </main>

    <footer></footer>
    <script src = "script.js"></script>
</body>
</html>
