<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital-clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main_container">

        <h1> Digital-Clock </h1>

    <div class="container">

        <div id="time">

            <p id="hr">60</p>
            <span>:</span>
            <p id="min">60</p>
            <span>:</span>
            <p id="sec">60</p>

            <p id="dayTime"> AM </p>

        </div>


        <div id="days">

            <p id="date">00</p>
            <span>/</span>
            <p id="month">00</p>
            <span>/</span>
            <p id="year">0000</p>
            
        </div>
        

    </div>

    </div>


</body>
<script src="script.js"></script>
</html>
