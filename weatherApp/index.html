<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-app</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>
</head>
<body>

    <header></header>

    <main>
        <div class="container">
            <h1>Weather app</h1>

            <div class="input">
                <input type="text" placeholder="Enter a city Name" spellcheck="false">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="weather">

                <div class="images">
                <img src="images/sun.jpg" alt="rainy_img" id="weather-images">
                <p id="temp">22°c</p>
                <p id="city">Bhiwani</p>
            </div>

            <div class="wind_humidity">

                <div class="humidity">
                    <img src="images/humidity.png" alt="humidity">

                    <div>
                        <p id="per">64 %</p>
                        <p id="hum">humidity</p>
                    </div>

                </div>

                <div class="speed">

                    <img src="images/wind.png" alt="humidity">

                    <div>
                        <p id="speed">64 km/h</p>
                        <p>Speed</p>
                    </div>

                </div>

            </div>
            
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
